name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

      - name: Wait for archive to be available
        run: sleep 5

      - name: Download tarball and compute SHA256
        id: sha
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$URL" -o release.tar.gz
          SHA=$(shasum -a 256 release.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Update all formulas with new URL and SHA
        run: |
          for formula in Formula/*.rb; do
            sed -i "s|url \".*\"|url \"${{ steps.sha.outputs.url }}\"|" "$formula"
            sed -i "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.sha256 }}\"|" "$formula"
          done
          echo "Updated formulas:"
          cat Formula/*.rb

      - name: Commit and push formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git commit -m "Update formulas for ${{ github.ref_name }}"
          git push origin main
