name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: crew/go.sum

      - name: Build
        working-directory: crew
        run: go build -o crew ./main.go

      - name: Vet
        working-directory: crew
        run: go vet ./...

      - name: Test version flag
        working-directory: crew
        run: ./crew --version | grep -q "crew"

  lint-formula:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Symlink tap into Homebrew
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/furlanluka/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "${{ github.workspace }}" "$TAP_DIR"

      - name: Lint formulas
        run: brew audit --formula furlanluka/tap/crew
